<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>

<!-- Link CSS File -->
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>My Image Gallery</h1>

<div class="gallery">
  <img src="img1.jpg" onclick="openLightbox(0)">
  <img src="img2.jpg" onclick="openLightbox(1)">
  <img src="img3.jpg" onclick="openLightbox(2)">
  <img src="img4.jpg" onclick="openLightbox(3)">
  <img src="img5.jpg" onclick="openLightbox(4)">
</div>

<div class="lightbox" id="lightbox">
  <span class="close" onclick="closeLightbox()">&times;</span>
  <span class="nav-btn prev" onclick="changeImage(-1)">&#10094;</span>
  <img id="lightbox-img">
  <span class="nav-btn next" onclick="changeImage(1)">&#10095;</span>
</div>

<!-- Link JavaScript File -->
<script src="script.js"></script>

</body>
</html>
